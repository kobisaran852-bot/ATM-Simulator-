<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-8 border-blue-600">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">bocBank ATM</h1>

        <div id="login-section" class="space-y-4">
            <p class="text-sm text-gray-500 text-center">Please enter your 4-digit PIN</p>
            <input type="password" id="pin-input" maxlength="4" placeholder="****" 
                class="w-full text-center text-3xl tracking-widest p-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-500">
            <button onclick="handleLogin()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
                Access Account
            </button>
            <p id="login-error" class="text-red-500 text-sm text-center hidden">Invalid PIN. Try again.</p>
        </div>

        <div id="dashboard-section" class="hidden space-y-6">
            <div class="bg-blue-50 p-4 rounded-lg text-center">
                <p class="text-gray-600 text-sm">Current Balance</p>
                <h2 class="text-3xl font-bold text-blue-900">$<span id="balance-display">1000</span></h2>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="showPrompt('deposit')" class="bg-green-500 hover:bg-green-600 text-white py-3 rounded-lg font-semibold">Deposit</button>
                <button onclick="showPrompt('withdraw')" class="bg-amber-500 hover:bg-amber-600 text-white py-3 rounded-lg font-semibold">Withdraw</button>
            </div>

            <button onclick="handleLogout()" class="w-full border-2 border-gray-200 text-gray-500 py-2 rounded-lg hover:bg-gray-50 transition">
                Logout
            </button>
        </div>
    </div>

    <script>
        // --- JavaScript Logic ---
        let balance = 1000;
        const CORRECT_PIN = "1234";

        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const balanceDisplay = document.getElementById('balance-display');
        const pinInput = document.getElementById('pin-input');
        const loginError = document.getElementById('login-error');

        function handleLogin() {
            if (pinInput.value === CORRECT_PIN) {
                loginSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                loginError.classList.add('hidden');
                pinInput.value = '';
            } else {
                loginError.classList.remove('hidden');
                pinInput.value = '';
            }
        }

        function updateBalance() {
            balanceDisplay.innerText = balance.toLocaleString();
        }

        function showPrompt(type) {
            const amount = parseFloat(prompt(`Enter amount to ${type}:`));
            
            if (isNaN(amount) || amount <= 0) {
                alert("Please enter a valid positive number.");
                return;
            }

            if (type === 'withdraw') {
                if (amount > balance) {
                    alert("Insufficient funds!");
                } else {
                    balance -= amount;
                    alert(`Successfully withdrew $${amount}`);
                }
            } else if (type === 'deposit') {
                balance += amount;
                alert(`Successfully deposited $${amount}`);
            }

            updateBalance();
        }

        function handleLogout() {
            dashboardSection.classList.add('hidden');
            loginSection.classList.remove('hidden');
        }
    </script>
</body>
</html>
